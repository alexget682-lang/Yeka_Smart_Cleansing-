<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የካ ፅዳት | Firebase Cloud</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // የራስህን የ Firebase Config እዚህ አስገባ
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ቅሬታ ወደ Firebase ለመላክ
        window.submitComplaint = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                await addDoc(collection(db, "complaints"), {
                    ...data,
                    time: new Date().toLocaleString(),
                    status: 'New'
                });
                alert("ቅሬታዎ በ Firebase በተሳካ ሁኔታ ተመዝግቧል!");
                e.target.reset();
            } catch (error) {
                alert("ስህተት: " + error.message);
            }
        };
    </script>
</head>
<body>
    <form onsubmit="submitComplaint(event)">
        <input name="name" placeholder="ሙሉ ስም" required>
        <input name="phone" placeholder="ስልክ ቁጥር" required>
        <select name="wereda">
            <option>ወረዳ 01</option>
            <option>ወረዳ 02</option>
        </select>
        <button type="submit">ሪፖርት ላክ</button>
    </form>
</body>
</html>
