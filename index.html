<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>የካ ፅዳት | Central Cloud V10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #ff007f; --dark-pink: #2d0016; --bg: #0d0006; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        .pink-neon { color: var(--pink); text-shadow: 0 0 10px var(--pink), 0 0 20px var(--pink); }
        .glass-pink { background: rgba(45, 0, 22, 0.85); border: 2px solid var(--pink); border-radius: 20px; box-shadow: 0 0 20px rgba(255, 0, 127, 0.2); }
        .btn-pink { background: var(--pink); color: #000; font-weight: 900; border-radius: 12px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-pink:active { transform: scale(0.95); opacity: 0.9; }
        .input-pink { background: rgba(255, 0, 127, 0.05); border: 1px solid var(--pink); color: #fff; padding: 12px; border-radius: 10px; width: 100%; outline: none; }
        .bar-v { width: 35px; border-radius: 6px 6px 0 0; transition: height 0.8s ease-out; }
        #reader { width: 100% !important; border: none !important; border-radius: 15px; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ትክክለኛ የ Supabase ፕሮጀክት መረጃዎች
        const SUPABASE_URL = 'https://rhdumobjxnevytnbdbfq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoZHVtb2JqeG5ldnl0bmJkYmZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0NDkzMDksImV4cCI6MjA2NDAyNTMwOX0.fF5V7V68oO-S-g-Z0L76n8S6i3uM347hG8s0a7YqQ8s';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = () => {
            const [view, setView] = useState('landing');
            const [complaints, setComplaints] = useState([]);
            const [keys, setKeys] = useState(() => JSON.parse(localStorage.getItem('yeka_v10_keys')) || { citizen: '0000', admin: '1111', creator: '2222' });
            const [ui, setUi] = useState({ scanning: false, hasPhoto: false, hasGps: false });
            const [searchPhone, setSearchPhone] = useState('');
            const [foundReports, setFoundReports] = useState([]);
            const audioRef = useRef(new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'));

            const weredas = ["ወረዳ 01", "ወረዳ 02", "ወረዳ 03", "ወረዳ 04", "ወረዳ 05", "ወረዳ 06", "ወረዳ 07", "ወረዳ 08", "ወረዳ 09", "ወረዳ 10", "ወረዳ 11", "ወረዳ 12"];

            useEffect(() => {
                fetchComplaints();
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('access') === 'admin') setView('admin');
            }, []);

            useEffect(() => { localStorage.setItem('yeka_v10_keys', JSON.stringify(keys)); }, [keys]);

            const fetchComplaints = async () => {
                const { data, error } = await supabaseClient.from('complaints').select('*').order('id', { ascending: false });
                if (!error && data) setComplaints(data);
            };

            const submitForm = async (e) => {
                e.preventDefault();
                const data = Object.fromEntries(new FormData(e.target).entries());
                const report = { 
                    name: data.name,
                    phone: data.phone,
                    wereda: data.wereda,
                    type: data.type,
                    priority: data.priority,
                    status: 'New', 
                    time: new Date().toLocaleString() 
                };

                const { error } = await supabaseClient.from('complaints').insert([report]);
                if (error) {
                    alert("የሰርቨር ስህተት አጋጥሟል! እባክዎ በ Supabase Policies ውስጥ INSERT ፈቃድ መኖሩን ያረጋግጡ።");
                } else {
                    audioRef.current.play();
                    alert("ቅሬታዎ በማዕከላዊ ሰርቨር ላይ ተመዝግቧል!");
                    fetchComplaints();
                    setView('landing');
                }
            };

            const updateStatus = async (id, newStatus) => {
                const { error } = await supabaseClient.from('complaints').update({ status: newStatus }).eq('id', id);
                if (!error) {
                    setComplaints(complaints.map(i => i.id === id ? {...i, status: newStatus} : i));
                }
            };

            return (
                <div className="min-h-screen max-w-md mx-auto flex flex-col relative border-x border-pink-900/30 shadow-2xl">
                    <header className="p-4 glass-pink m-2 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <i className="fas fa-cloud pink-neon text-2xl animate-pulse"></i>
                            <h1 className="text-sm font-black pink-neon uppercase tracking-tighter">የካ ፅዳት - ክላውድ</h1>
                        </div>
                    </header>

                    <main className="flex-1 p-4 overflow-y-auto pb-20">
                        {view === 'landing' && (
                            <div className="space-y-6 pt-6 animate-in fade-in duration-500">
                                <button onClick={() => setView('citizen')} className="btn-pink w-full py-4 uppercase">አዲስ ቅሬታ ላክ</button>
                                <button onClick={() => setView('admin')} className="bg-white/10 w-full py-4 text-white uppercase rounded-xl">አስተዳዳሪ</button>
                            </div>
                        )}

                        {view === 'citizen' && (
                            <form onSubmit={submitForm} className="glass-pink p-8 space-y-5">
                                <h2 className="text-2xl font-black pink-neon uppercase italic">አዲስ ቅሬታ</h2>
                                <input name="name" placeholder="ሙሉ ስም" required className="input-pink" />
                                <input name="phone" placeholder="ስልክ ቁጥር" required className="input-pink" />
                                <select name="wereda" className="input-pink" required>
                                    <option value="">ወረዳ ይምረጡ</option>
                                    {weredas.map(w => <option key={w}>{w}</option>)}
                                </select>
                                <select name="type" className="input-pink"><option>የቤት ቆሻሻ</option><option>የንግድ ቆሻሻ</option></select>
                                <select name="priority" className="input-pink"><option>አስቸኳይ</option><option>መደበኛ</option></select>
                                <button type="submit" className="btn-pink w-full py-5 font-black uppercase">ላክ</button>
                                <button type="button" onClick={() => setView('landing')} className="w-full text-xs opacity-30 uppercase">ተመለስ</button>
                            </form>
                        )}

                        {view === 'admin' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-bold">የቅሬታዎች ዝርዝር</h2>
                                {complaints.map(c => (
                                    <div key={c.id} className="glass-pink p-4 text-xs">
                                        <p>{c.name} - {c.wereda}</p>
                                        <button onClick={() => updateStatus(c.id, 'Resolved')} className="bg-green-600 px-2 py-1 mt-2 rounded">ተፈቷል</button>
                                    </div>
                                ))}
                                <button onClick={() => setView('landing')} className="w-full text-xs opacity-30 uppercase">ተመለስ</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
